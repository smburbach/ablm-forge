# ABLM default training configuration (mirrors ablm.config.TrainConfig).
# Authoritative defaults: loaded by ablm.config.load_config. Values here MUST
# equal the TrainConfig dataclass defaults (enforced by tests/training/test_config.py).
train:
  # Duration
  max_steps: 50_000
  max_epochs: null

  # Batch
  batch_size: 32
  gradient_accumulation_steps: 1

  # Optimizer
  optimizer: adamw            # adamw | muon
  lr: 1.0e-4
  min_lr: 0.0
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.98
  adam_eps: 1.0e-8
  muon_adjust_lr_fn: match_rms_adamw   # match_rms_adamw | original
  muon_momentum: 0.95
  muon_nesterov: true
  muon_ns_steps: 5
  max_grad_norm: 1.0

  # Scheduler
  scheduler: warmup_linear    # warmup_linear | warmup_cosine | wsd_linear | wsd_cosine
  warmup_steps: 5_000
  stable_steps: 0             # WSD plateau length (WSD schedules only)

  # Logging
  log_every: 10
  wandb_project: ablm
  wandb_run_name: null
  wandb_enabled: true

  # Checkpointing
  save_every: 10_000
  save_total_limit: 3
  resume_from: null

  # Infrastructure
  seed: 42
  output_dir: outputs
  mixed_precision: bf16       # bf16 | fp16 | no
  compile: false
  compile_mode: default       # default | reduce-overhead | max-autotune

  # Memory / sharding. Launch multi-GPU with torchrun:
  #   torchrun --standalone --nproc_per_node=8 -m ablm.train --config <this>
  gradient_checkpointing: false
  # FSDP2: set fsdp to "full_shard auto_wrap" to shard params/grads/optimizer;
  # leave "" for single-GPU / DDP. fsdp_config defaults to wrapping AblmBlock
  # with fsdp_version 2 — override here for a custom policy.
  fsdp: ""
  fsdp_config: null
