# ABLM default model configuration (HuggingFace AblmConfig field names).
# Authoritative defaults: loaded by ablm.config.load_config. Any field omitted
# here falls through to the AblmConfig.__init__ default. Derived fields
# (head_dim, intermediate_size, rope_dim, nope_dim) are omitted so they resolve
# from the source dimensions unless explicitly overridden.
#
# These defaults track the ESM-C architecture: Pre-LN, full RoPE, SwiGLU,
# bias-free layers (norm_bias=false, ffn_bias=false), no QK-norm, no residual
# scaling, and ESM-style masked-token dropout. Toggle the knobs below to explore
# variants (qk_norm, residual_scaling, norm_strategy, canon, ...).
model:
  # Core dimensions (~400M parameters)
  vocab_size: 33
  hidden_size: 1024
  num_hidden_layers: 32
  num_attention_heads: 16
  max_position_embeddings: 1024

  # Positional encoding (full RoPE by default: rope_dim resolves to head_dim)
  rope_theta: 10000.0
  nope_dim: 0

  # Normalization (ESM-C: bias-free Pre-LN, no QK-norm)
  norm_type: layernorm # layernorm | rmsnorm
  norm_eps: 1.0e-6
  norm_bias: false # ESM-C uses bias-free layer norms
  norm_strategy: pre # pre | sandwich | hybrid | post_sdpa
  qk_norm: false
  post_embed_norm: false
  residual_scaling: none # sqrt_num_layers | none
  init_scale_output_projections: true

  # Feed-forward (ESM-C: bias-free SwiGLU)
  ffn_activation: swiglu # gated FFN, 3 projections (ESM-C uses SwiGLU)
  ffn_bias: false

  # Dropout
  attention_dropout: 0.0
  hidden_dropout: 0.0

  # Embeddings / head
  tie_word_embeddings: false
  mlm_head_activation: gelu # gelu | silu | relu
  # ESM-2-style masked-token embedding rescaling. ESM-C removed it (redundant
  # under Pre-LN and it perturbs inference), so the ESM-C-exact default is off;
  # set true to opt back into the ESM-2 behavior.
  token_dropout: false

  # Canon depthwise convolution (off by default)
  canon_enabled: false
  canon_positions: [] # subset of {A, B, C, D}
  canon_kernel_sizes: 4
  canon_activation: none # none | silu | gelu

  # Init / checkpointing
  initializer_range: 0.02
  gradient_checkpointing: false
